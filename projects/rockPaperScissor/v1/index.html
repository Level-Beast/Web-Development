<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 1. Global Reset & Page Setup */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 2. Main Game Container */
        .thisgame {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 3. Typography */
        h1 {
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* 4. Results & Score Area */
        .resultGroup {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
        }
        .result {
            font-size: 18px;
            font-weight: 600;
            color: #ffd700; /* Gold color for the result text */
            margin: 0 0 10px 0;
        }
        .score {
            font-size: 48px;
            font-weight: bold;
            margin: 0;
            color: #ffffff;
        }

        /* 5. Action Buttons (Choices) */
        .choices {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 25px;
        }

        /* Base button styles for choices */
        .choices .btn {
            flex: 1;
            padding: 14px 10px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Bright, energetic gradient colors for each choice */
        .choices .btn[data-choice="Rock"] {
            background: linear-gradient(135deg, #ff416c, #ff4b2b); /* Coral Red */
            box-shadow: 0 4px 15px rgba(255, 75, 43, 0.4);
        }

        .choices .btn[data-choice="Paper"] {
            background: linear-gradient(135deg, #00b4db, #0083b0); /* Electric Blue */
            box-shadow: 0 4px 15px rgba(0, 180, 219, 0.4);
        }

        .choices .btn[data-choice="Scissor"] {
            background: linear-gradient(135deg, #11998e, #38ef7d); /* Neon Green */
            box-shadow: 0 4px 15px rgba(56, 239, 125, 0.4);
        }

        /* Lift up and glow brighter on hover */
        .choices .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.15);
        }

        /* Click effect */
        .choices .btn:active {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        /* 6. Reset Button Styles */
        button:not(.choices button) {
            background-color: transparent;
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 6px 16px;
            font-size: 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: none; /* Keeps it hidden until selected */
        }
        button:not(.choices button):hover {
            background-color: #ffffff;
            color: #1e3c72;
            border-color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="thisgame">
        <h1>Rock Paper Scissor Game</h1>
        <button>Reset</button>

        <div class="resultGroup">
            <p class="result">...</p>
            <p class="score"></p>
        </div>

        <div class="choices">
            <!-- Fixed lowercase issue to match CSS data attributes -->
            <button class="btn" data-choice="Rock">Rock</button>
            <button class="btn" data-choice="Paper">Paper</button>
            <button class="btn" data-choice="Scissor">Scissor</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
