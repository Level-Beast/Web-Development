<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
      .thisCard{
        margin: 0 auto;
        width: 50%;
        border: 5px dotted red;
        margin-top: 480px;
        height: 20vh;
      }
      .thisCard h1{
         margin: 0 auto;
         width: 50%;
        
         text-align: center;
         
      }
      .thisCard p{
        font-size: 38px;
        display: inline-block;
        margin-top: 40px;
        margin-left: 40px;
      }
      .thisCard button{
        margin-top: 40px;
        margin-left: 40px;
        display: block;
        padding: 20px  40px;
        border-radius: 18px;
        background-color: green ;
      }
    </style>
</head>
<body>
    <div class="thisCard">
        <h1>Frontend Developer</h1>
        <p>I build website with HTML & CSS</p>
        <button>Hire Me</button>
    </div>
</body>
</html>
