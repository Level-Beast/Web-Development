<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .navbar{
            display: flex;
            justify-content:space-between;
            align-items: center;
            border: 2px solid red;
            padding: 20px 30px;
        }
        .links{
            display: flex;
            gap: 40px;
        }
        .myintro{
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;    
        }
        button{
            padding: 14px;
            border-radius: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">Logo</div>
        <div class="links">
            <a href="">Home</a>
            <a href="">About</a>
            <a href="">Contact</a>
        </div>
    </div>
    <div class="myintro">
        <h1>Hi, I'm Jugraj</h1>
        <p>Frontend Web Developer</p>
        <p>I build responsive websites.</p>
        <button>Contact Me</button>
    </div>
</body>
</html>
