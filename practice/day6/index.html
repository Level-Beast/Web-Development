<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding:0;
            box-sizing: border-box;
        }
        .hero{
            height: 100vh;
            border: 2px dotted black;
            text-align: center;
        }
        h1{
            font-size: 2.5rem;
            padding-top :120px ;
        }
        h2{
             font-size: 2rem;
              padding-top :80px ;
        }
        p{
            font-size: 1.8rem;
             padding-top :60px ;
             padding-bottom: 40px;
        }
        button{
            padding: 16px;
            border-radius: 14px;
            cursor: pointer;
            background-color: bisque;
        }

    </style>
</head>
<body>
    <div class="hero">
        <h1 class="content">Jugraj Singh</h1>
        <h2 class="content">Frontend Web Developer</h2>
        <p class="content">I build websites with HTML & CSS</p>
        <button class="content">Contact Me</button>
    </div>
</body>
</html>
