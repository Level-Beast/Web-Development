<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1{
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid red;
            margin-bottom: 100px;
            gap:10px;
        }
        .boxes{
            border: 4px solid green;
            height: 20px;
            width: 40px;
            padding: 30px;
        }
         .box2{
            display: flex;
            justify-content: space-evenly;
            border: 2px solid red;
            gap: 40px;
            margin-bottom: 100px;
        }

         .box3{
            flex-direction: column;
            display: flex;
            justify-content: start;
            align-items: start;
            
            border: 2px solid red;
            gap: 40px;
            margin-bottom: 100px;
        }
        .box4{
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid red;
            gap: 40px;
            margin-bottom: 100px;
            flex-wrap: wrap;
        }
        .navbar{
            border: 2px solid red;
            display: flex;
            justify-content: space-between;
            height: 100px;
            align-items: center;
            padding: 0px 30px;
        }
        .login{
            display: flex;
            gap: 20px;
        }
    </style>
</head>
<body>
    <div class="box1">
        <div class="boxes">Box 1</div>

    <div class="box3">

    </div>
     <div class="box4">
        <div class="boxes">Box 1</div>
        <div class="boxes">Box 2</div>
        <div class="boxes">Box 3</div>
        <div class="boxes">Box 1</div>
        <div class="boxes">Box 2</div>
        <div class="boxes">Box 3</div>
    </div>
    <div class="navbar">
        <a href="">Logo</a>
        <div class="login">
            <a href="">Login</a>
            <a href="">Signup</a>
        </div>
    </div>
    
</body>
</html>
