<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            height: 100vh;
            border: 2px dotted red;
            display: grid;
            grid-template-columns: repeat(5,1fr);
        }
        .box{
            border: 2px solid red;
        }
        .header{
            grid-column:1/6;
        }
        .sidebar{
            border-color: blue;
            grid-column: 1/3;
            grid-row: 2/4;
        }
        .card1{
            grid-column: 3/6;
            grid-row: 2/3;
        }
        .card2{
             grid-column: 3/6;
            grid-row: 3/4;
        }
        .footer{
            grid-column: 1/6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header box">Header</div>
        <div class="sidebar box">SideBar</div>
        <div class="card1 box">card 1</div>
        <div class="card2 box">card 2</div>
        <div class="footer box">Footer</div>
    </div>
</body>
</html>
